name: Scrape latest data

on:
    push:
    workflow_dispatch:
    schedule:
        - cron: " 0 7 * * *"

env:
    DUCKDB_VERSION: "1.3.2"

jobs:
    scheduled:
        runs-on: ubuntu-latest
        steps:
            - name: Install Deno
              uses: denoland/setup-deno@v1
              with:
                  deno-version: v2.x

            - name: Install DuckDB
              run: |
                  curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v${DUCKDB_VERSION}/duckdb_cli-linux-amd64.zip" -o duckdb.zip
                  unzip duckdb.zip
                  chmod +x duckdb
                  sudo mv duckdb /usr/local/bin/duckdb

            - name: Check out this repo
              uses: actions/checkout@v3

            - name: Set scrape date
              id: date
              run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

            # ── Phase 1: Git scraping (produces cds.json) ──

            - name: Fetch latest data
              run: |-
                  deno run \
                    --allow-net \
                    --allow-env \
                    --allow-write=./cds.json \
                    --allow-read \
                    index.ts

            - name: Commit scraped JSON
              run: |-
                  git config user.name "Automated"
                  git config user.email "actions@users.noreply.github.com"
                  git add -A
                  timestamp=$(date -u)
                  git commit -m "Latest data: ${timestamp}" || exit 0
                  git push

            # ── Phase 2: Freeze a DuckLake snapshot ──

            - name: Build Frozen DuckLake
              run: |-
                  mkdir -p parquet
                  sed "s/{{DATE}}/${{ steps.date.outputs.date }}/g" freeze.sql > freeze-run.sql
                  duckdb < freeze-run.sql

            - name: Commit DuckLake
              run: |-
                  git config user.name "Automated"
                  git config user.email "actions@users.noreply.github.com"
                  git add parquet/*.parquet rytmeboxen.ducklake
                  timestamp=$(date -u)
                  git commit -m "DuckLake snapshot: ${timestamp}" || exit 0
                  git push
